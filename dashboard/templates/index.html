<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Push-Up Counter Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Live Push-Up Counter</h1>
    </header>
    <main>
        <section id="video-feed">
            <h2>Video Feed</h2>
            <video id="live-feed" autoplay></video>
        </section>
        <section id="form-analysis">
            <h2>Form Analysis</h2>
            <div id="form-feedback"></div>
        </section>
        <section id="workout-statistics">
            <h2>Workout Statistics</h2>
            <p id="total-pushups">Total Push-Ups: 0</p>
            <p id="average-form">Average Form Score: N/A</p>
        </section>
        <section id="charts">
            <h2>Charts</h2>
            <canvas id="pushup-chart"></canvas>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
